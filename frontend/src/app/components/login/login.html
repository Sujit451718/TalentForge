<div class="auth-container">
  <div class="card auth-card">
    <h2 class="text-gradient">Welcome Back</h2>
    <p>Login to continue your interview prep</p>
    
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="error-message" *ngIf="errorMessage">{{errorMessage}}</div>
      
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" [(ngModel)]="loginData.email" required placeholder="john@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="loginData.password" required placeholder="••••••••">
      </div>
      
      <button type="submit" class="btn-primary w-full">Login</button>
    </form>
    
    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
